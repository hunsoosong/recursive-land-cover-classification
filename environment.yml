# Conda environment for the verification script and protocol module.
# PyTorch is installed separately via pip — see README.md.
name: recursive-land-cover
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy>=1.24,<2.1
  - pandas>=2.0
  - scipy>=1.10
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - pyarrow>=14
  - tqdm
  - jupyterlab
  - ipykernel
  - pip
  - pip:
      - tabulate
